[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @agentvisa/localhost-demo... build"

[deploy]
startCommand = "node packages/localhost-demo/scripts/serve-static.mjs"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
